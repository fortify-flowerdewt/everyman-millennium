<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyman Millennium Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612; --ink-2: #4a4540; --ink-3: #8a837a;
    --parchment: #faf7f2; --parchment-2: #f2ede4; --parchment-3: #e8e0d4;
    --gold: #b8952a; --gold-light: #f5e9c8; --gold-mid: #d4ac42;
    --crimson: #8b2020; --crimson-light: #f9ecec;
    --green: #2a5c3a; --border: #d8cfc4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--parchment); color: var(--ink); min-height: 100vh; font-size: 15px; }

  /* ── PIN SCREEN ── */
  #pin-screen {
    position: fixed; inset: 0; background: var(--ink);
    display: flex; align-items: center; justify-content: center; z-index: 200;
  }
  #pin-screen.hidden { display: none; }
  .pin-box {
    text-align: center; padding: 3rem 2.5rem;
    background: #242018; border: 1px solid #4a4030; border-radius: 6px;
    width: 320px;
  }
  .pin-box h1 { font-family: 'Libre Baskerville', serif; color: var(--parchment); font-size: 1.4rem; margin-bottom: 0.25rem; }
  .pin-box p { color: #b8aa9a; font-size: 0.8rem; margin-bottom: 2rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .pin-dots { display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 2rem; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #6a5f4a; background: transparent; transition: all 0.15s; }
  .pin-dot.filled { background: var(--gold-mid); border-color: var(--gold-mid); }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
  .pin-key {
    font-family: 'Libre Baskerville', serif; font-size: 1.2rem; color: var(--parchment);
    background: #2e2820; border: 1px solid #4a4030; border-radius: 4px;
    padding: 0.85rem; cursor: pointer; transition: all 0.1s; user-select: none;
  }
  .pin-key:hover { background: #3a3028; border-color: var(--gold); }
  .pin-key:active { transform: scale(0.95); }
  .pin-key.del { font-size: 0.9rem; color: #b8aa9a; }
  .pin-error { color: var(--crimson); font-size: 0.8rem; margin-top: 1rem; min-height: 1.2em; }
  .pin-setup-hint { color: #b8aa9a; font-size: 0.75rem; margin-top: 1rem; line-height: 1.5; }

  /* ── HEADER ── */
  .site-header { background: var(--ink); color: var(--parchment); padding: 1.5rem 2.5rem; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: flex-end; gap: 2rem; flex-wrap: wrap; }
  .site-header h1 { font-family: 'Libre Baskerville', serif; font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
  .site-header h1 span { display: block; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; font-weight: 300; color: #b8aa9a; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .stats-bar { display: flex; gap: 1.75rem; flex-wrap: wrap; align-items: flex-end; }
  .stat { text-align: right; }
  .stat-num { font-family: 'Libre Baskerville', serif; font-size: 1.4rem; color: var(--gold-mid); line-height: 1; }
  .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: #b8aa9a; margin-top: 2px; }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; }
  .btn-sm { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; padding: 0.35rem 0.75rem; border-radius: 3px; cursor: pointer; transition: all 0.15s; border: 1px solid #6a5f4a; color: #c8baa8; background: transparent; }
  .btn-sm:hover { border-color: var(--gold-mid); color: var(--gold-mid); }
  .sync-status { font-size: 0.72rem; color: #6a5f4a; display: flex; align-items: center; gap: 0.4rem; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #6a5f4a; flex-shrink: 0; }
  .sync-dot.synced { background: #4a8c5a; }
  .sync-dot.syncing { background: var(--gold-mid); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--crimson); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── PROGRESS ── */
  .progress-wrap { background: var(--parchment-2); border-bottom: 1px solid var(--border); padding: 0.9rem 2.5rem; display: flex; align-items: center; gap: 1.5rem; }
  .progress-track { flex: 1; height: 8px; background: var(--parchment-3); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-mid)); border-radius: 4px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.8rem; color: var(--ink-3); min-width: 80px; text-align: right; }

  /* ── CONTROLS ── */
  .controls { padding: 1.1rem 2.5rem; background: var(--parchment-2); border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  .controls input[type="text"], .controls select { font-family: 'DM Sans', sans-serif; font-size: 0.875rem; border: 1px solid var(--border); background: var(--parchment); color: var(--ink); padding: 0.5rem 0.75rem; border-radius: 4px; outline: none; transition: border-color 0.15s; }
  .controls input[type="text"]:focus, .controls select:focus { border-color: var(--gold); }
  .controls input[type="text"] { min-width: 220px; flex: 1; }
  .filter-group { display: flex; gap: 4px; }
  .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; padding: 0.4rem 0.85rem; border: 1px solid var(--border); background: var(--parchment); color: var(--ink-2); cursor: pointer; border-radius: 3px; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--ink); border-color: var(--ink); color: var(--parchment); }

  /* ── GRID ── */
  .book-grid { padding: 2rem 2.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; }
  .book-card { background: #fff; border: 1px solid var(--border); border-radius: 3px; padding: 1rem 1.1rem; cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; }
  .book-card:hover { border-color: var(--gold); border-left-color: var(--gold); box-shadow: 0 2px 8px rgba(26,22,18,0.08); }
  .book-card.owned { border-left-color: var(--green); }
  .book-card.owned .card-status-dot { background: var(--green); border-color: var(--green); }
  .book-card.reading { border-left-color: var(--gold); }
  .book-card.reading .card-status-dot { background: var(--gold-mid); border-color: var(--gold-mid); }
  .book-card.read { border-left-color: var(--crimson); }
  .book-card.read .card-status-dot { background: var(--crimson); border-color: var(--crimson); }
  .book-card.wishlist .card-status-dot { background: var(--parchment-3); border-color: var(--ink-3); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.3rem; }
  .card-num { font-size: 0.68rem; color: var(--ink-3); letter-spacing: 0.06em; margin-top: 2px; white-space: nowrap; }
  .card-title { font-family: 'Libre Baskerville', serif; font-size: 0.9rem; font-weight: 700; line-height: 1.35; flex: 1; }
  .card-author { font-size: 0.78rem; color: var(--ink-2); margin-bottom: 0.4rem; font-style: italic; }
  .card-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .card-tag { font-size: 0.68rem; padding: 2px 7px; border-radius: 2px; }
  .tag-price { background: var(--gold-light); color: #7a5c10; }
  .tag-source { background: var(--parchment-3); color: var(--ink-2); }
  .tag-read { background: var(--crimson-light); color: var(--crimson); }
  .tag-reading { background: #fff8e8; color: #8a6010; }
  .card-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; background: var(--parchment-3); border: 1.5px solid var(--border); }
  .no-results { text-align: center; padding: 4rem 2rem; color: var(--ink-3); grid-column: 1/-1; }
  .no-results p { font-family: 'Libre Baskerville', serif; font-style: italic; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,8,6,0.55); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--parchment); border: 1px solid var(--border); border-radius: 4px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(10,8,6,0.18); }
  .modal-header { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
  .modal-header h2 { font-family: 'Libre Baskerville', serif; font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
  .modal-author { font-size: 0.85rem; color: var(--ink-2); font-style: italic; margin-top: 3px; }
  .modal-num { font-size: 0.7rem; color: var(--ink-3); letter-spacing: 0.08em; margin-bottom: 4px; }
  .modal-body { padding: 0 1.5rem 1.5rem; }
  .field-group { margin-bottom: 1rem; }
  .field-group label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); margin-bottom: 5px; }
  .field-group input, .field-group select, .field-group textarea { font-family: 'DM Sans', sans-serif; font-size: 0.875rem; width: 100%; border: 1px solid var(--border); background: #fff; color: var(--ink); padding: 0.5rem 0.75rem; border-radius: 3px; outline: none; transition: border-color 0.15s; }
  .field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color: var(--gold); }
  .field-group textarea { resize: vertical; min-height: 72px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; padding-top: 0.75rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 0.5rem 1.1rem; border-radius: 3px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .btn-primary { background: var(--ink); color: var(--parchment); border-color: var(--ink); }
  .btn-primary:hover { background: #2d2820; }
  .btn-ghost { background: transparent; color: var(--ink-2); border-color: var(--border); }
  .btn-ghost:hover { border-color: var(--ink-2); }

  /* ── LOADING ── */
  #loading-overlay { position: fixed; inset: 0; background: var(--ink); display: flex; align-items: center; justify-content: center; z-index: 150; transition: opacity 0.3s; }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text { font-family: 'Libre Baskerville', serif; color: var(--gold-mid); font-size: 1rem; letter-spacing: 0.1em; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-overlay"><div class="loading-text">Loading…</div></div>

<!-- PIN Screen -->
<div id="pin-screen">
  <div class="pin-box">
    <h1>Everyman Millennium Library</h1>
    <p id="pin-label">Enter your PIN</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinClear()">CLR</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinBackspace()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-setup-hint" id="pin-hint"></div>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none">
  <header class="site-header">
    <div>
      <h1><span>Everyman's Library</span>Millennium Library</h1>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="stat-owned">0</div><div class="stat-label">owned</div></div>
      <div class="stat"><div class="stat-num" id="stat-read">0</div><div class="stat-label">read</div></div>
      <div class="stat"><div class="stat-num" id="stat-spent">£0</div><div class="stat-label">spent</div></div>
      <div class="stat"><div class="stat-num" id="stat-total">250</div><div class="stat-label">total</div></div>
      <div class="header-actions">
        <div class="sync-status"><div class="sync-dot synced" id="sync-dot"></div><span id="sync-text">Synced</span></div>
        <button class="btn-sm" onclick="signOutUser()">Lock</button>
      </div>
    </div>
  </header>

  <div class="progress-wrap">
    <div style="font-size:0.78rem;color:var(--ink-3);min-width:90px">Collection progress</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 / 250</div>
  </div>

  <div class="controls">
    <input type="text" id="search-input" placeholder="Search by title or author…" oninput="renderGrid()">
    <select id="filter-status" onchange="renderGrid()">
      <option value="all">All statuses</option>
      <option value="owned">Owned</option>
      <option value="reading">Reading</option>
      <option value="read">Read</option>
      <option value="wishlist">Wishlist</option>
      <option value="none">Not yet acquired</option>
    </select>
    <select id="sort-by" onchange="renderGrid()">
      <option value="number">Sort by number</option>
      <option value="title">Sort by title</option>
      <option value="author">Sort by author</option>
    </select>
    <div class="filter-group">
      <button class="filter-btn active" onclick="filterOwned(this,'all')">All</button>
      <button class="filter-btn" onclick="filterOwned(this,'owned')">In collection</button>
      <button class="filter-btn" onclick="filterOwned(this,'unowned')">Needed</button>
    </div>
  </div>

  <div class="book-grid" id="book-grid"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-num" id="m-num"></div>
      <h2 id="m-title"></h2>
      <div class="modal-author" id="m-author"></div>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field-group">
          <label>Status</label>
          <select id="m-status">
            <option value="none">Not acquired</option>
            <option value="wishlist">Wishlist</option>
            <option value="owned">Owned</option>
            <option value="reading">Currently reading</option>
            <option value="read">Read</option>
          </select>
        </div>
        <div class="field-group">
          <label>Price paid (£)</label>
          <input type="number" id="m-price" step="0.01" min="0" placeholder="0.00">
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label>Source</label>
          <input type="text" id="m-source" placeholder="e.g. Oxfam, eBay…">
        </div>
        <div class="field-group">
          <label>Date acquired</label>
          <input type="date" id="m-date">
        </div>
      </div>
      <div class="field-group">
        <label>Condition</label>
        <select id="m-condition">
          <option value="">—</option>
          <option value="New">New</option>
          <option value="Fine">Fine</option>
          <option value="Very Good">Very Good</option>
          <option value="Good">Good</option>
          <option value="Fair">Fair</option>
        </select>
      </div>
      <div class="field-group">
        <label>Notes</label>
        <textarea id="m-notes" placeholder="Any notes about this copy…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveBook()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDDR6U5ZjVTcVQxuY4rmhWRuRcuna16yFQ",
  authDomain: "everyman-millennium.firebaseapp.com",
  projectId: "everyman-millennium",
  storageBucket: "everyman-millennium.firebasestorage.app",
  messagingSenderId: "316573102484",
  appId: "1:316573102484:web:cee0d2c3232fc7a24e1f81"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── PIN SYSTEM ──
// The PIN hashes to a deterministic Firebase anonymous UID by storing
// a mapping in localStorage: pin_hash → firebase_uid
// First time: user sets a PIN → signs in anonymously → stores uid against pin hash
// Subsequent times: user enters PIN → looks up uid → can't re-auth to same anon account
// So we use a simpler approach: store the PIN hash in localStorage and use a single
// anonymous account per device, protected by PIN entry before showing the app.

const PIN_KEY = 'everyman_pin_hash_v2'; // v2: 6-digit PINs (old 4-digit hashes ignored)
const SESSION_KEY = 'everyman_session';
let currentPin = '';
let pendingNewPin = null; // set while confirming a brand-new PIN (one with no library yet)
let currentUserId = null;
let currentLibraryId = null; // = PIN hash; the key your data is stored under, shared across devices
let collData = {};
let ownerFilter = 'all';
let currentEdit = null;
let saveTimeout = null;
let unsubscribe = null;

// Simple hash
async function hashPin(pin) {
  const msgBuffer = new TextEncoder().encode('everyman-salt-' + pin);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
}

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  dot.className = 'sync-dot ' + state;
  text.textContent = state === 'synced' ? 'Synced' : state === 'syncing' ? 'Saving…' : 'Offline';
}

// ── BOOT ──
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading-overlay').classList.add('hidden');
  // Fast path: this device has a remembered, unlocked session — go straight in.
  const storedHash = localStorage.getItem(PIN_KEY);
  const session = sessionStorage.getItem(SESSION_KEY);
  if (user && session === 'ok' && storedHash) {
    currentUserId = user.uid;
    currentLibraryId = storedHash;
    showApp(user.uid);
  } else {
    showPinScreen(); // single "Enter your PIN" prompt on every device
  }
});

// ── PIN SCREEN ──
// Single 6-digit entry on every device. On submit we sign in anonymously and
// check Firestore: if a library already exists for this PIN, open it; if not,
// ask the user to confirm the PIN once, then create a new library.
window.pinKey = function(digit) {
  if (currentPin.length >= 6) return;
  currentPin += digit;
  updateDots(currentPin.length);
  if (currentPin.length === 6) {
    if (pendingNewPin === null) submitPin();
    else confirmNewPin();
  }
}

window.pinBackspace = function() {
  currentPin = currentPin.slice(0, -1);
  updateDots(currentPin.length);
}

window.pinClear = function() {
  currentPin = '';
  updateDots(0);
  document.getElementById('pin-error').textContent = '';
}

function updateDots(n) {
  for (let i = 0; i < 6; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < n);
  }
}

function setPinPrompt(label, hint) {
  document.getElementById('pin-label').textContent = label;
  document.getElementById('pin-hint').textContent = hint || '';
}

function showPinScreen() {
  pendingNewPin = null;
  currentPin = '';
  updateDots(0);
  document.getElementById('pin-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-error').textContent = '';
  setPinPrompt('Enter your PIN', 'Use the same 6-digit PIN on any device to reach your library.');
}

// Ensure we have an anonymous Firebase session (Firestore access needs auth).
async function ensureSignedIn() {
  if (auth.currentUser) return auth.currentUser;
  return (await signInAnonymously(auth)).user;
}

async function libraryExists(hash) {
  const ref = doc(db, 'libraries', hash, 'data', 'collection');
  const snap = await getDoc(ref);
  return snap.exists();
}

async function enterLibrary(user, hash) {
  localStorage.setItem(PIN_KEY, hash);
  sessionStorage.setItem(SESSION_KEY, 'ok');
  currentUserId = user.uid;
  currentLibraryId = hash;
  document.getElementById('pin-screen').classList.add('hidden');
  showApp(user.uid);
}

async function submitPin() {
  const pin = currentPin;
  document.getElementById('pin-error').textContent = '';
  let user, exists;
  try {
    user = await ensureSignedIn();
    exists = await libraryExists(await hashPin(pin));
  } catch (e) {
    document.getElementById('pin-error').textContent = 'Connection problem. Please try again.';
    currentPin = ''; updateDots(0);
    return;
  }
  const hash = await hashPin(pin);
  if (exists) {
    enterLibrary(user, hash);
  } else {
    // No library for this PIN — confirm before creating a new one.
    pendingNewPin = pin;
    currentPin = '';
    updateDots(0);
    setPinPrompt('New PIN — confirm it', 'No library found for that PIN. Re-enter it to create a new library.');
  }
}

async function confirmNewPin() {
  const confirm = currentPin;
  if (confirm !== pendingNewPin) {
    pendingNewPin = null;
    currentPin = '';
    updateDots(0);
    document.getElementById('pin-error').textContent = 'PINs didn\'t match. Start again.';
    setPinPrompt('Enter your PIN', 'Use the same 6-digit PIN on any device to reach your library.');
    return;
  }
  const pin = pendingNewPin;
  pendingNewPin = null;
  try {
    const user = await ensureSignedIn();
    const hash = await hashPin(pin);
    // Create the library doc so future logins detect it as existing.
    const ref = doc(db, 'libraries', hash, 'data', 'collection');
    if (!(await getDoc(ref)).exists()) await setDoc(ref, { books: {} });
    enterLibrary(user, hash);
  } catch (e) {
    document.getElementById('pin-error').textContent = 'Could not create the library. Please try again.';
    currentPin = ''; updateDots(0);
    setPinPrompt('Enter your PIN', 'Use the same 6-digit PIN on any device to reach your library.');
  }
}

window.signOutUser = function() {
  sessionStorage.removeItem(SESSION_KEY);
  if (unsubscribe) unsubscribe();
  showPinScreen();
}

// ── APP ──
async function showApp(uid) {
  document.getElementById('pin-screen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';

  // Data is keyed by the PIN hash (currentLibraryId) so it's shared across devices.
  const docRef = doc(db, 'libraries', currentLibraryId, 'data', 'collection');
  try {
    const snap = await getDoc(docRef);
    let books = snap.exists() ? (snap.data().books || {}) : {};
    // Migration: if this PIN's library is empty, try to pull data from the old
    // per-device anonymous account (users/<uid>/data/collection) and copy it in.
    if (Object.keys(books).length === 0 && uid) {
      try {
        const legacyRef = doc(db, 'users', uid, 'data', 'collection');
        const legacy = await getDoc(legacyRef);
        const legacyBooks = legacy.exists() ? (legacy.data().books || {}) : {};
        if (Object.keys(legacyBooks).length) {
          await setDoc(docRef, { books: legacyBooks });
          books = legacyBooks;
          console.info('[migrate] copied', Object.keys(legacyBooks).length, 'books from legacy account', uid);
        } else {
          console.info('[migrate] no legacy data found under account', uid);
        }
      } catch (mig) {
        console.error('[migrate] FAILED — likely Firestore rules block reads of /users/<uid>. Error:', mig);
      }
    }
    collData = books;
  } catch(e) {
    console.warn('[load] initial load failed, using empty data:', e);
  }

  renderGrid();

  // Real-time listener
  unsubscribe = onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
      collData = snap.data().books || {};
      renderGrid();
      setSyncStatus('synced');
    }
  }, (err) => {
    setSyncStatus('error');
  });
}

// ── SAVE TO FIRESTORE ──
function scheduleSave() {
  setSyncStatus('syncing');
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    try {
      const docRef = doc(db, 'libraries', currentLibraryId, 'data', 'collection');
      await setDoc(docRef, { books: collData });
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus('error');
    }
  }, 800);
}

// ── RENDER ──
window.renderGrid = function() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filterStatus = document.getElementById('filter-status').value;
  const sortBy = document.getElementById('sort-by').value;
  let books = BOOKS_RAW.map(([num, title, author]) => ({ num, title, author, data: getBook(num) }));
  if (search) books = books.filter(b => b.title.toLowerCase().includes(search) || b.author.toLowerCase().includes(search));
  if (filterStatus !== 'all') books = books.filter(b => b.data.status === filterStatus);
  if (ownerFilter === 'owned') books = books.filter(b => b.data.status !== 'none');
  else if (ownerFilter === 'unowned') books = books.filter(b => b.data.status === 'none');
  if (sortBy === 'title') books.sort((a,b) => a.title.localeCompare(b.title));
  else if (sortBy === 'author') books.sort((a,b) => a.author.localeCompare(b.author));
  else books.sort((a,b) => a.num - b.num);
  const grid = document.getElementById('book-grid');
  grid.innerHTML = '';
  if (!books.length) { grid.innerHTML = '<div class="no-results"><p>No books match.</p></div>'; updateStats(); return; }
  books.forEach(({ num, title, author, data }) => {
    const card = document.createElement('div');
    card.className = 'book-card ' + data.status;
    card.onclick = () => openModal(num);
    let tags = '';
    if (data.price) tags += `<span class="card-tag tag-price">£${parseFloat(data.price).toFixed(2)}</span>`;
    if (data.source) tags += `<span class="card-tag tag-source">${esc(data.source)}</span>`;
    if (data.status === 'read') tags += `<span class="card-tag tag-read">Read</span>`;
    if (data.status === 'reading') tags += `<span class="card-tag tag-reading">Reading</span>`;
    card.innerHTML = `<div class="card-top"><span class="card-num">#${num}</span><div class="card-status-dot"></div></div><div class="card-title">${esc(title)}</div><div class="card-author">${esc(author)}</div>${tags ? `<div class="card-meta">${tags}</div>` : ''}`;
    grid.appendChild(card);
  });
  updateStats();
}

function updateStats() {
  const all = BOOKS_RAW.map(([num]) => getBook(num));
  const owned = all.filter(b => b.status !== 'none').length;
  const read = all.filter(b => b.status === 'read').length;
  const spent = all.reduce((s,b) => s + (parseFloat(b.price)||0), 0);
  document.getElementById('stat-owned').textContent = owned;
  document.getElementById('stat-read').textContent = read;
  document.getElementById('stat-spent').textContent = '£' + spent.toFixed(2);
  document.getElementById('stat-total').textContent = BOOKS_RAW.length;
  const pct = owned / BOOKS_RAW.length * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = owned + ' / ' + BOOKS_RAW.length;
}

function getBook(num) { return collData[num] || { status: 'none', price: '', source: '', date: '', condition: '', notes: '' }; }

window.openModal = function(num) {
  const [_, title, author] = BOOKS_RAW.find(b => b[0] === num);
  const data = getBook(num);
  currentEdit = num;
  document.getElementById('m-num').textContent = 'No. ' + num;
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-author').textContent = author;
  document.getElementById('m-status').value = data.status || 'none';
  document.getElementById('m-price').value = data.price || '';
  document.getElementById('m-source').value = data.source || '';
  document.getElementById('m-date').value = data.date || '';
  document.getElementById('m-condition').value = data.condition || '';
  document.getElementById('m-notes').value = data.notes || '';
  document.getElementById('modal').classList.add('open');
}

window.closeModal = function() { document.getElementById('modal').classList.remove('open'); currentEdit = null; }
window.closeModalOnBg = function(e) { if (e.target === document.getElementById('modal')) closeModal(); }

window.saveBook = function() {
  if (!currentEdit) return;
  collData[currentEdit] = {
    status: document.getElementById('m-status').value,
    price: document.getElementById('m-price').value,
    source: document.getElementById('m-source').value,
    date: document.getElementById('m-date').value,
    condition: document.getElementById('m-condition').value,
    notes: document.getElementById('m-notes').value,
  };
  closeModal();
  renderGrid();
  scheduleSave();
}

window.filterOwned = function(btn, val) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ownerFilter = val;
  renderGrid();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
